# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Application ───────────────────────────────────────────────────────────────
spring.application.name=qms-suite

# ── Datasource — Render injects DATABASE_URL as postgres://user:pass@host/db ──
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/qmsdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:qmsuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:qmspass}
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ── CORS — accept frontend Render URL ────────────────────────────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost}
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true

# ── PDF ───────────────────────────────────────────────────────────────────────
app.pdf.output-dir=${PDF_OUTPUT_DIR:/tmp/certificates}

# ── Lab Info ──────────────────────────────────────────────────────────────────
app.lab.name=${LAB_NAME:QMS Suite Laboratory}
app.lab.nabl-cert-no=${LAB_NABL_CERT:TC-XXXX-2024}
app.lab.address=${LAB_ADDRESS:Chennai, Tamil Nadu}

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.health.mail.enabled=false

# ── SpringDoc / Swagger ───────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.qmssuite=INFO
logging.level.org.springframework.security=WARN
