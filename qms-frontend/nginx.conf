upstream backend_upstream {
    server backend:8080;
    keepalive 32;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api calls to Spring Boot
    location /api/ {
        proxy_pass         http://backend_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts — give Spring Boot time to respond
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        # Return 503 (not 502) if backend is down, with JSON body
        proxy_intercept_errors on;
        error_page 502 503 504 = @backend_down;
    }

    # Swagger UI
    location /swagger-ui/ {
        proxy_pass http://backend_upstream/swagger-ui/;
        proxy_set_header Host $host;
    }

    # Angular SPA — all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Friendly JSON error when backend is down
    location @backend_down {
        default_type application/json;
        return 503 '{"success":false,"error":"Backend service unavailable. Please try again in a moment."}';
    }

    gzip on;
    gzip_types text/plain application/javascript text/css application/json application/xml;
    gzip_min_length 1000;
}
