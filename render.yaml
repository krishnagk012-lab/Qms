# Render Blueprint — QMS Suite
# Deploy all three services from one file
# See: https://render.com/docs/blueprint-spec

services:

  # ── 1. Backend (Spring Boot) ─────────────────────────────────────────────
  - type: web
    name: qms-backend
    runtime: docker
    dockerfilePath: ./qms-backend/Dockerfile
    dockerContext: ./qms-backend
    plan: free                        # change to "starter" for always-on
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: "8080"
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: qms-postgres
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: qms-postgres
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: qms-postgres
          property: password
      - key: JWT_SECRET
        generateValue: true           # Render generates a secure random value
      - key: CORS_ALLOWED_ORIGINS
        value: "https://qms-frontend.onrender.com"
      - key: LAB_NAME
        value: "QMS Suite Laboratory"
      - key: PDF_OUTPUT_DIR
        value: "/tmp/certificates"

  # ── 2. Frontend (Angular + nginx) ────────────────────────────────────────
  - type: web
    name: qms-frontend
    runtime: docker
    dockerfilePath: ./qms-frontend/Dockerfile
    dockerContext: ./qms-frontend
    plan: free
    healthCheckPath: /health
    dockerBuildArgs:
      - key: API_URL
        value: "https://qms-backend.onrender.com/api"
    envVars: []

# ── 3. PostgreSQL Database ──────────────────────────────────────────────────
databases:
  - name: qms-postgres
    plan: free                        # 1GB, 97 connection limit on free tier
    databaseName: qmsdb
    user: qmsuser
