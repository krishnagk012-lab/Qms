services:

  postgres:
    image: postgres:16-alpine
    container_name: qms-postgres
    environment:
      POSTGRES_DB: qmsdb
      POSTGRES_USER: qmsuser
      POSTGRES_PASSWORD: qmspass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qmsuser -d qmsdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./qms-backend
      dockerfile: Dockerfile
    container_name: qms-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/qmsdb
      SPRING_DATASOURCE_USERNAME: qmsuser
      SPRING_DATASOURCE_PASSWORD: qmspass
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: ./qms-frontend
      dockerfile: Dockerfile
    container_name: qms-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "4200:80"
    restart: unless-stopped

volumes:
  postgres_data:
